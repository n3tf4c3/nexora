plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.capturasms'
version = '0.1.0'

android {
  namespace "expo.modules.capturasms"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // Envio em background com retry/backoff, mesmo com o app fechado.
  implementation 'androidx.work:work-runtime:2.10.1'
}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgres://dummy:dummy@localhost:5432/dummy"
      # Valor de CI, nunca de produção (env.ts rejeita marcador de exemplo em prod).
      AUTH_SECRET: "dummy-secret-para-build-0000000000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run web:build

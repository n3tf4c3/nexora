name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgres://dummy:dummy@localhost:5432/dummy"
      # Valor de CI, nunca de produção (env.ts rejeita marcador de exemplo em prod).
      AUTH_SECRET: "dummy-secret-para-build-0000000000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run web:build

  android:
    name: Android JVM tests e assembleDebug
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      EXPO_NO_GIT_STATUS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Instalar dependências JavaScript
        run: npm ci
      - name: Instalar SDK e toolchain Android
        run: |
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;27.1.12297006"
      - name: Gerar projeto Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --no-install
      - name: Testar módulo de captura
        working-directory: apps/mobile/android
        run: ./gradlew --no-daemon :captura-sms:testDebugUnitTest --stacktrace
      - name: Compilar APK debug sem dispositivo
        working-directory: apps/mobile/android
        run: ./gradlew --no-daemon :app:assembleDebug -PreactNativeArchitectures=x86_64 --stacktrace
